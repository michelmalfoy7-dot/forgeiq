<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <!-- Fond sombre avec gradient subtil -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1017"/>
      <stop offset="100%" stop-color="#0A0C0F"/>
    </linearGradient>

    <!-- Glow vert pour le F -->
    <filter id="glow-f" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.9
                0 0 0 0 0.05
                0 0 0 0.5 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient vert pour le F -->
    <linearGradient id="fg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CCFF58"/>
      <stop offset="100%" stop-color="#86CA16"/>
    </linearGradient>

    <!-- Ligne décorative accent -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B4FF4A" stop-opacity="0"/>
      <stop offset="30%" stop-color="#B4FF4A" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#B4FF4A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B4FF4A" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow pour les points de data -->
    <filter id="glow-dot">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Grille subtile (lignes horizontales très légères) -->
  <line x1="0" y1="100" x2="1024" y2="100" stroke="#1F242E" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="200" x2="1024" y2="200" stroke="#1F242E" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="300" x2="1024" y2="300" stroke="#1F242E" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="400" x2="1024" y2="400" stroke="#1F242E" stroke-width="1" opacity="0.5"/>

  <!-- Courbe de progression (sparkline décorative) -->
  <polyline
    points="80,380 160,350 240,320 320,290 380,270 440,240 500,200 560,180 620,160 700,140 780,130 860,120 920,110"
    fill="none"
    stroke="#B4FF4A"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.12"/>

  <!-- Zone sous la courbe (fill très léger) -->
  <polygon
    points="80,380 160,350 240,320 320,290 380,270 440,240 500,200 560,180 620,160 700,140 780,130 860,120 920,110 920,500 80,500"
    fill="#B4FF4A"
    opacity="0.03"/>

  <!-- Séparateur vertical gauche/droite -->
  <line x1="420" y1="60" x2="420" y2="440" stroke="#1F242E" stroke-width="1" opacity="0.6"/>

  <!-- ===== CÔTÉ GAUCHE : Logo F ===== -->

  <!-- Icône background (carré arrondi sombre) -->
  <rect x="60" y="110" width="280" height="280" rx="52" fill="#111318" opacity="0.9"/>
  <rect x="60" y="110" width="280" height="280" rx="52" fill="none" stroke="#1F242E" stroke-width="1.5"/>

  <!-- Monogramme F -->
  <path
    d="
      M 108,148
      L 308,148
      L 277,178
      L 169,178
      L 169,245
      L 265,245
      L 234,275
      L 169,275
      L 169,352
      L 108,352
      Z
    "
    fill="url(#fg-grad)"
    filter="url(#glow-f)"
  />

  <!-- ===== CÔTÉ DROIT : Texte ===== -->

  <!-- Nom de l'app -->
  <text x="460" y="195"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="900"
    letter-spacing="-2"
    fill="#F0F2F5">ForgeIQ</text>

  <!-- Ligne accent sous le titre -->
  <rect x="460" y="210" width="220" height="3" rx="2" fill="url(#line-grad)"/>

  <!-- Tagline -->
  <text x="460" y="255"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="24"
    font-weight="700"
    letter-spacing="0.5"
    fill="#B4FF4A">Build smarter. Lift harder.</text>

  <!-- Description courte -->
  <text x="460" y="300"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="400"
    fill="#6B7280">Coach IA · Entraînement · Nutrition · Progression</text>

  <!-- Pills / badges features -->
  <!-- Pill 1 -->
  <rect x="460" y="330" width="120" height="34" rx="17" fill="#B4FF4A22" stroke="#B4FF4A44" stroke-width="1"/>
  <text x="520" y="352" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13" font-weight="600" fill="#B4FF4A">Entraînement</text>

  <!-- Pill 2 -->
  <rect x="594" y="330" width="100" height="34" rx="17" fill="#3D8BFF22" stroke="#3D8BFF44" stroke-width="1"/>
  <text x="644" y="352" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13" font-weight="600" fill="#3D8BFF">Nutrition</text>

  <!-- Pill 3 -->
  <rect x="708" y="330" width="88" height="34" rx="17" fill="#FF6B3522" stroke="#FF6B3544" stroke-width="1"/>
  <text x="752" y="352" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13" font-weight="600" fill="#FF6B35">Coach IA</text>

  <!-- Prix -->
  <text x="460" y="420"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="15"
    font-weight="500"
    fill="#6B7280">Gratuit · Pro 4,99€/mois · Lifetime 39,99€</text>

  <!-- Points lumineux sur la courbe (décoratifs) -->
  <circle cx="500" cy="200" r="5" fill="#B4FF4A" opacity="0.5" filter="url(#glow-dot)"/>
  <circle cx="700" cy="140" r="5" fill="#B4FF4A" opacity="0.5" filter="url(#glow-dot)"/>
  <circle cx="920" cy="110" r="6" fill="#B4FF4A" opacity="0.8" filter="url(#glow-dot)"/>
</svg>
