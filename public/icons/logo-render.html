<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  body { width: 800px; height: 800px; background: transparent; overflow: hidden; }
  svg { display: block; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Background: subtle radial, more depth -->
    <radialGradient id="bg" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#1A202E"/>
      <stop offset="100%" stop-color="#07090C"/>
    </radialGradient>

    <!-- F gradient: crisp acid green, darker at base -->
    <linearGradient id="fg" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%"   stop-color="#D6FF5C"/>
      <stop offset="40%"  stop-color="#B4FF4A"/>
      <stop offset="100%" stop-color="#75B525"/>
    </linearGradient>

    <!-- Highlight strip on top edges -->
    <linearGradient id="hl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Outer glow (wide, soft) -->
    <filter id="glow-wide" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Inner glow (tight, sharp) -->
    <filter id="glow-tight" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background rounded square ── -->
  <rect width="800" height="800" rx="172" fill="url(#bg)"/>

  <!-- Subtle inner vignette (darkens corners) -->
  <radialGradient id="vig" cx="50%" cy="50%" r="50%">
    <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.45)"/>
  </radialGradient>
  <rect width="800" height="800" rx="172" fill="url(#vig)"/>

  <!--
    F geometry  (800×800 canvas, optimised for circle crop)
    Vertical bar : x 188–302, y 148–650  (w=114, h=502)
    Top bar      : x 188–558, y 148–262  (h=114) — right end diagonal ↘ 32px
    Middle bar   : x 188–468, y 360–455  (h=95)  — right end diagonal ↘ 28px
    Diagonal cut : bottom-right corner pulled left by ~32-28px
  -->

  <!-- ── Wide glow layer ── -->
  <g opacity="0.42" filter="url(#glow-wide)">
    <polygon points="188,148 302,148 302,650 188,650" fill="#B4FF4A"/>
    <polygon points="188,148 558,148 526,262 188,262" fill="#B4FF4A"/>
    <polygon points="188,360 468,360 440,455 188,455" fill="#B4FF4A"/>
  </g>

  <!-- ── Tight glow layer ── -->
  <g opacity="0.55" filter="url(#glow-tight)">
    <polygon points="188,148 302,148 302,650 188,650" fill="#C8FF50"/>
    <polygon points="188,148 558,148 526,262 188,262" fill="#C8FF50"/>
    <polygon points="188,360 468,360 440,455 188,455" fill="#C8FF50"/>
  </g>

  <!-- ── F main fill ── -->
  <g>
    <!-- Vertical bar -->
    <polygon points="188,148 302,148 302,650 188,650" fill="url(#fg)"/>
    <!-- Top horizontal bar (diagonal right end) -->
    <polygon points="188,148 558,148 526,262 188,262" fill="url(#fg)"/>
    <!-- Middle horizontal bar (diagonal right end) -->
    <polygon points="188,360 468,360 440,455 188,455" fill="url(#fg)"/>
  </g>

  <!-- ── Highlight (top-edge shimmer on each bar) ── -->
  <g opacity="1">
    <!-- Top of vertical bar -->
    <polygon points="188,148 302,148 302,186 188,186" fill="url(#hl)"/>
    <!-- Top of top bar -->
    <polygon points="302,148 558,148 526,186 302,186" fill="url(#hl)"/>
    <!-- Top of middle bar -->
    <polygon points="188,360 468,360 440,392 188,392" fill="url(#hl)"/>
  </g>

</svg>
</body>
</html>
